name: Deploy to Apify
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: apify/push-actor-action@v1.0.0
        id: push
        continue-on-error: true
        with:
          token: ${{ secrets.APIFY_TOKEN }}
      - name: Set publication metadata
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          echo "Setting metadata for ${USERNAME}~${ACTOR_NAME}..."
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "PissedConsumer Reviews Scraper | Consumer Complaints",
              "description": "The ONLY PissedConsumer scraper on Apify. Extract consumer complaints, ratings, monetary losses, preferred resolutions, and company profiles. Handles JavaScript-rendered pages. For reputation monitoring and consumer intelligence.",
              "seoTitle": "PissedConsumer Scraper - Extract Consumer Complaints",
              "seoDescription": "Scrape PissedConsumer reviews and complaints. Extract ratings, monetary losses, resolutions. The only PissedConsumer scraper available. $2.00 per 1,000 reviews.",
              "categories": ["LEAD_GENERATION", "AUTOMATION", "BUSINESS"]
            }' \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          if 'error' in d:
              print('METADATA ERROR:', d['error'].get('message','unknown'))
          else:
              data=d.get('data',{})
              for f in ['title','description','seoTitle','seoDescription','categories','pictureUrl']:
                  print(f'{f}: {data.get(f,\"NOT SET\")}')
          "
      - name: Make actor public (needs T&C acceptance in console first)
        id: publish
        if: always()
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          ACTOR_NAME=$(python3 -c "import json; print(json.load(open('.actor/actor.json'))['name'])")
          USERNAME=$(curl -s -H "Authorization: Bearer $APIFY_TOKEN" https://api.apify.com/v2/users/me | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['data']['username'])")
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"isPublic": true}' \
            "https://api.apify.com/v2/acts/${USERNAME}~${ACTOR_NAME}")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          if 'error' in d:
              print('NOT YET PUBLIC:', d['error'].get('message','unknown'))
              print('Actor is deployed but not visible in Store. Accept T&C at https://console.apify.com to publish.')
              sys.exit(1)
          else:
              print('SUCCESS: actor is now public')
          "
